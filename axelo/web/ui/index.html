<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axelo</title>
    <style>
      :root {
        --app-bg: #f8f8f6;
        --stage-bg: #fcfcfb;
        --rail-bg: #f6f5f3;
        --surface: #ffffff;
        --surface-muted: #fafaf8;
        --border-hairline: rgba(18, 18, 18, 0.06);
        --border-soft: rgba(18, 18, 18, 0.04);
        --text-strong: #1d1d1b;
        --text-body: #4d4d49;
        --text-muted: #8a8a84;
        --text-faint: #b8b7b1;
        --running: #536b8a;
        --blocked: #9a7a46;
        --failed: #935050;
        --completed: #4f775d;
        --radius-nav: 12px;
        --radius-input-inner: 18px;
        --radius-composer: 24px;
        --space-1: 6px;
        --space-2: 10px;
        --space-3: 14px;
        --space-4: 18px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;
        --shadow-composer: 0 10px 30px rgba(18, 18, 18, 0.035);
        --font: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--app-bg); color: var(--text-strong); font-family: var(--font); }
      button, textarea, input { font: inherit; }

      #app {
        height: 100vh;
        display: grid;
        grid-template-columns: 236px minmax(0, 1fr) 320px;
        background: var(--app-bg);
      }

      #app[data-mode="home"] {
        grid-template-columns: 236px minmax(0, 1fr);
      }

      #app[data-mode="home"] .system-rail {
        display: none;
      }

      .rail {
        background: var(--rail-bg);
        border-right: 1px solid var(--border-soft);
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .nav-head {
        padding: 4px 4px 14px;
      }

      .brand {
        font-size: 18px;
        letter-spacing: -0.03em;
        font-weight: 500;
        color: var(--text-strong);
      }

      .nav-action,
      .nav-link,
      .nav-session {
        border-radius: var(--radius-nav);
        border: 1px solid transparent;
        background: transparent;
        color: var(--text-body);
        font-size: 14px;
      }

      .nav-action {
        width: auto;
        margin: 0 0 10px;
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
      }

      .nav-action:hover,
      .nav-link:hover,
      .nav-session:hover,
      .nav-session.is-active {
        background: rgba(18, 18, 18, 0.03);
      }

      .nav-block + .nav-block { margin-top: 12px; }

      .nav-label {
        font-size: 12px;
        color: var(--text-faint);
        margin: 0 0 8px;
        padding: 0 10px;
      }

      .nav-links {
        display: grid;
        gap: 2px;
      }

      .nav-link {
        padding: 9px 10px;
      }

      .nav-history {
        display: grid;
        gap: 2px;
        overflow: auto;
        padding-right: 2px;
      }

      .nav-session {
        width: 100%;
        text-align: left;
        padding: 9px 10px;
        cursor: pointer;
      }

      .nav-session-title {
        display: block;
        font-size: 13px;
        line-height: 1.45;
        color: var(--text-body);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-session-meta {
        display: block;
        margin-top: 2px;
        font-size: 12px;
        color: var(--text-faint);
        text-transform: capitalize;
      }

      .nav-user {
        margin-top: auto;
        padding: 14px 10px 2px;
        border-top: 1px solid var(--border-soft);
        font-size: 12px;
        color: var(--text-faint);
      }

      .workspace {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 18px;
        background: var(--stage-bg);
      }

      .workspace-card,
      .system-shell {
        min-height: 0;
      }

      .chat-shell {
        min-height: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .home-shell {
        height: 100%;
        display: grid;
        place-items: start center;
        padding: min(18vh, 160px) var(--space-7) var(--space-6);
      }

      .home-stack {
        width: min(100%, 820px);
        display: grid;
        justify-items: center;
        gap: 24px;
      }

      .home-title {
        margin: 0;
        font-size: clamp(40px, 4vw, 44px);
        line-height: 1.08;
        font-weight: 500;
        letter-spacing: -0.035em;
        color: var(--text-strong);
        text-align: center;
      }

      .composer-shell {
        width: 100%;
      }

      .composer-card {
        width: min(100%, 760px);
        border: 1px solid rgba(18, 18, 18, 0.07);
        background: var(--surface);
        border-radius: var(--radius-composer);
        box-shadow: var(--shadow-composer);
        padding: 14px 16px 12px;
      }

      .composer-input {
        width: 100%;
        resize: none;
        border: 0;
        background: transparent;
        min-height: 104px;
        padding: 4px 2px 10px;
        color: var(--text-strong);
        font-size: 15px;
        line-height: 1.6;
        outline: none;
      }

      .composer-input::placeholder {
        color: var(--text-faint);
      }

      .composer-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--border-soft);
        padding-top: 12px;
      }

      .composer-tools,
      .composer-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .composer-chip {
        border: 0;
        background: transparent;
        color: var(--text-muted);
        border-radius: 999px;
        padding: 5px 8px;
        font-size: 12px;
        cursor: pointer;
      }

      .composer-chip:hover,
      .composer-icon:hover {
        background: rgba(18, 18, 18, 0.03);
      }

      .composer-icon {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .composer-submit {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        border: 1px solid rgba(18, 18, 18, 0.08);
        background: var(--surface-muted);
        color: var(--text-body);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      }

      .composer-submit:hover {
        background: rgba(18, 18, 18, 0.04);
        border-color: rgba(18, 18, 18, 0.12);
      }

      .composer-submit:disabled {
        opacity: 0.48;
        cursor: default;
      }

      .conversation-shell {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        border: 1px solid var(--border-soft);
        border-radius: 28px;
        background: var(--stage-bg);
      }

      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 18px 24px 16px;
        border-bottom: 1px solid var(--border-soft);
      }

      .chat-eyebrow,
      .sys-section-title {
        font-size: 12px;
        color: var(--text-faint);
      }

      .chat-title {
        margin-top: 4px;
        font-size: 20px;
        letter-spacing: -0.03em;
        color: var(--text-strong);
      }

      .chat-phase {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: capitalize;
      }

      .thread-viewport {
        overflow: auto;
        padding: 28px 24px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .msg {
        max-width: 780px;
        padding: 14px 16px;
        border: 1px solid var(--border-soft);
        border-radius: 18px;
        background: var(--surface);
      }

      .msg.user-message {
        margin-left: auto;
      }

      .msg.agent-activity-block {
        background: var(--surface-muted);
      }

      .msg.deliverable-block {
        border-color: rgba(79, 119, 93, 0.18);
      }

      .msg-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .msg-label {
        font-size: 12px;
        color: var(--text-faint);
      }

      .msg-status {
        font-size: 12px;
        text-transform: capitalize;
        color: var(--text-muted);
      }

      .msg-title {
        margin-bottom: 8px;
        font-size: 15px;
        color: var(--text-strong);
      }

      .msg-body {
        color: var(--text-body);
        line-height: 1.72;
        white-space: normal;
        word-break: break-word;
      }

      .status-running .msg-status { color: var(--running); }
      .status-blocked .msg-status { color: var(--blocked); }
      .status-failed .msg-status { color: var(--failed); }
      .status-completed .msg-status { color: var(--completed); }

      .conversation-shell .composer-shell {
        border-top: 1px solid var(--border-soft);
        padding: 14px 18px 18px;
        background: var(--stage-bg);
      }

      .conversation-shell .composer-card {
        width: 100%;
        max-width: none;
        box-shadow: none;
        border-radius: 20px;
        padding-top: 10px;
      }

      .conversation-shell .composer-input {
        min-height: 72px;
      }

      .composer-error,
      .sys-empty,
      .sys-step-note,
      .sys-agent-task {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .conversation-shell .composer-error {
        margin-top: 10px;
        color: var(--failed);
      }

      .system-rail {
        border-left: 1px solid var(--border-soft);
        background: var(--rail-bg);
        padding: 14px;
        min-height: 0;
      }

      .system-shell {
        height: 100%;
        display: grid;
        gap: 10px;
        align-content: start;
        overflow: auto;
      }

      .sys-section {
        border: 1px solid var(--border-soft);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.58);
        padding: 14px;
      }

      .sys-section-body {
        margin-top: 10px;
      }

      .sys-objective {
        font-size: 14px;
        line-height: 1.6;
      }

      .sys-inline-meta {
        display: flex;
        gap: 12px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: capitalize;
      }

      .sys-list {
        display: grid;
        gap: 10px;
      }

      .sys-step,
      .sys-agent,
      .sys-checkpoint {
        display: grid;
        gap: 4px;
      }

      .sys-step {
        grid-template-columns: 8px minmax(0, 1fr);
        gap: 10px;
      }

      .sys-step-dot {
        width: 8px;
        height: 8px;
        margin-top: 5px;
        border-radius: 50%;
        background: rgba(24, 24, 20, 0.14);
      }

      .sys-step-running .sys-step-dot { background: var(--running); }
      .sys-step-blocked .sys-step-dot { background: var(--blocked); }
      .sys-step-failed .sys-step-dot { background: var(--failed); }
      .sys-step-completed .sys-step-dot { background: var(--completed); }

      .sys-step-title,
      .sys-agent-head {
        font-size: 13px;
        color: var(--text-strong);
      }

      .sys-agent-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .sys-agent-status {
        color: var(--text-faint);
        text-transform: capitalize;
        font-size: 11px;
      }

      .sys-metrics {
        display: grid;
        gap: 10px;
      }

      .sys-metrics div,
      .sys-dev-grid div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
      }

      .sys-metrics span,
      .sys-dev-grid span {
        color: var(--text-faint);
      }

      .sys-dev {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .sys-dev summary { cursor: pointer; }
      .sys-dev-grid { margin-top: 10px; display: grid; gap: 8px; }

      @media (max-width: 1180px) {
        #app { grid-template-columns: 220px minmax(0, 1fr) 292px; }
        #app[data-mode="home"] { grid-template-columns: 220px minmax(0, 1fr); }
      }

      @media (max-width: 960px) {
        #app { grid-template-columns: 1fr; }
        #app[data-mode="home"] { grid-template-columns: 1fr; }
        .rail, .system-rail { display: none; }
        .workspace { padding: 12px; }
        .home-shell { padding: 14vh 18px 24px; }
        .home-title { font-size: 34px; }
        .composer-card { width: 100%; }
      }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app" data-mode="home">
      <aside class="rail">
        <div class="nav-head">
          <div class="brand" id="session-title">Axelo</div>
        </div>
        <button id="new-chat-btn" class="nav-action">New chat</button>
        <div class="nav-block">
          <div class="nav-links">
            <div class="nav-link">Search</div>
            <div class="nav-link">Projects</div>
            <div class="nav-link">Artifacts</div>
            <div class="nav-link">History</div>
          </div>
        </div>
        <div class="nav-block" style="min-height:0; flex:1;">
          <div class="nav-label">Recent chats</div>
          <div id="session-list" class="nav-history"></div>
        </div>
        <div class="nav-user">Signed in as Axelo workspace</div>
      </aside>

      <main class="workspace">
        <div id="chat-root" class="workspace-card"></div>
      </main>

      <aside class="system-rail">
        <div id="system-root"></div>
      </aside>
    </div>
  </body>
</html>
