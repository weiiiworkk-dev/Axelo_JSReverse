<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axelo</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --rail: #efebe4;
        --panel: rgba(255, 255, 255, 0.72);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --border: rgba(24, 24, 20, 0.10);
        --border-soft: rgba(24, 24, 20, 0.06);
        --text: #1f1d19;
        --muted: #6b675f;
        --soft: #8a857d;
        --running: #536b8a;
        --blocked: #9a7a46;
        --failed: #935050;
        --completed: #4f775d;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 18px;
        --space-1: 8px;
        --space-2: 12px;
        --space-3: 16px;
        --space-4: 24px;
        --space-5: 32px;
        --shadow: 0 6px 18px rgba(25, 22, 16, 0.04);
        --font: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
      button, textarea { font: inherit; }

      #app {
        height: 100vh;
        display: grid;
        grid-template-columns: 248px minmax(0, 1fr) 344px;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.34), transparent 28%),
          linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0));
      }

      .rail {
        background: var(--rail);
        border-right: 1px solid var(--border);
        padding: var(--space-3);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .nav-head {
        padding: var(--space-1) 0 var(--space-4);
      }

      .nav-title {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--soft);
        margin-bottom: 6px;
      }

      .brand {
        font-size: 20px;
        letter-spacing: -0.03em;
      }

      .nav-action {
        width: 100%;
        margin-bottom: var(--space-4);
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.48);
        border-radius: var(--radius-md);
        padding: 12px 14px;
        text-align: left;
        cursor: pointer;
        color: var(--text);
      }

      .nav-block + .nav-block { margin-top: var(--space-4); }
      .nav-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--soft);
        margin-bottom: 8px;
      }

      .nav-links {
        display: grid;
        gap: 6px;
      }

      .nav-link {
        padding: 8px 10px;
        border-radius: var(--radius-sm);
        color: var(--muted);
        border: 1px solid transparent;
      }

      .nav-history {
        display: grid;
        gap: 8px;
        overflow: auto;
        padding-right: 2px;
      }

      .nav-session {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        background: transparent;
        border-radius: var(--radius-sm);
        padding: 10px;
        cursor: pointer;
      }

      .nav-session:hover,
      .nav-session.is-active {
        background: rgba(255,255,255,0.52);
        border-color: var(--border-soft);
      }

      .nav-session-title {
        display: block;
        font-size: 13px;
        line-height: 1.45;
        color: var(--text);
      }

      .nav-session-meta {
        display: block;
        margin-top: 4px;
        font-size: 11px;
        color: var(--soft);
        text-transform: capitalize;
      }

      .nav-user {
        margin-top: auto;
        padding-top: var(--space-4);
        border-top: 1px solid var(--border-soft);
        font-size: 13px;
        color: var(--muted);
      }

      .workspace {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: var(--space-3);
      }

      .workspace-card,
      .system-shell {
        min-height: 0;
      }

      .chat-shell {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: var(--space-4);
        border-bottom: 1px solid var(--border-soft);
      }

      .chat-eyebrow,
      .sys-section-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .chat-title {
        margin-top: 6px;
        font-size: 20px;
        letter-spacing: -0.03em;
      }

      .chat-phase {
        font-size: 12px;
        color: var(--muted);
        text-transform: capitalize;
      }

      .thread-viewport {
        overflow: auto;
        padding: var(--space-4);
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .thread-empty {
        display: grid;
        gap: 16px;
        padding-top: 6vh;
      }

      .thread-empty-note {
        max-width: 520px;
        color: var(--muted);
        line-height: 1.7;
      }

      .msg {
        max-width: 760px;
        padding: 14px 16px;
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-md);
        background: var(--panel-strong);
      }

      .msg.user-message {
        margin-left: auto;
        background: rgba(255,255,255,0.96);
      }

      .msg.agent-activity-block {
        background: rgba(251, 250, 247, 0.98);
      }

      .msg.deliverable-block {
        border-color: rgba(79, 119, 93, 0.18);
      }

      .msg.system-notice {
        background: rgba(248, 245, 238, 0.92);
      }

      .msg-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .msg-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .msg-status {
        font-size: 11px;
        text-transform: capitalize;
        color: var(--muted);
      }

      .msg-title {
        margin-bottom: 8px;
        font-size: 15px;
        color: var(--text);
      }

      .msg-body {
        color: var(--muted);
        line-height: 1.72;
        white-space: normal;
        word-break: break-word;
      }

      .status-running .msg-status { color: var(--running); }
      .status-blocked .msg-status { color: var(--blocked); }
      .status-failed .msg-status { color: var(--failed); }
      .status-completed .msg-status { color: var(--completed); }

      .composer-shell {
        border-top: 1px solid var(--border-soft);
        padding: 14px 18px 18px;
        background: rgba(245, 241, 234, 0.62);
      }

      .composer-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .composer-hint,
      .composer-error,
      .sys-empty,
      .sys-step-note,
      .sys-agent-task {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .composer-input-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .composer-input {
        resize: none;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.88);
        border-radius: var(--radius-md);
        min-height: 58px;
        padding: 16px;
        color: var(--text);
        outline: none;
      }

      .composer-send,
      .subtle-action {
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.72);
        color: var(--text);
        padding: 0 16px;
        cursor: pointer;
      }

      .composer-send { min-width: 84px; }
      .composer-error { margin-top: 10px; color: var(--failed); }

      .system-rail {
        border-left: 1px solid var(--border);
        background: var(--rail);
        padding: var(--space-3);
        min-height: 0;
      }

      .system-shell {
        height: 100%;
        display: grid;
        gap: 10px;
        align-content: start;
        overflow: auto;
      }

      .sys-section {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: rgba(255,255,255,0.58);
        padding: 14px;
      }

      .sys-section-body {
        margin-top: 10px;
      }

      .sys-objective {
        font-size: 14px;
        line-height: 1.6;
      }

      .sys-inline-meta {
        display: flex;
        gap: 12px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        text-transform: capitalize;
      }

      .sys-list {
        display: grid;
        gap: 10px;
      }

      .sys-step,
      .sys-agent,
      .sys-checkpoint {
        display: grid;
        gap: 4px;
      }

      .sys-step {
        grid-template-columns: 8px minmax(0, 1fr);
        gap: 10px;
      }

      .sys-step-dot {
        width: 8px;
        height: 8px;
        margin-top: 5px;
        border-radius: 50%;
        background: rgba(24,24,20,0.14);
      }

      .sys-step-running .sys-step-dot { background: var(--running); }
      .sys-step-blocked .sys-step-dot { background: var(--blocked); }
      .sys-step-failed .sys-step-dot { background: var(--failed); }
      .sys-step-completed .sys-step-dot { background: var(--completed); }

      .sys-step-title,
      .sys-agent-head {
        font-size: 13px;
        color: var(--text);
      }

      .sys-agent-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .sys-agent-status {
        color: var(--soft);
        text-transform: capitalize;
        font-size: 11px;
      }

      .sys-metrics {
        display: grid;
        gap: 10px;
      }

      .sys-metrics div,
      .sys-dev-grid div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
      }

      .sys-metrics span,
      .sys-dev-grid span {
        color: var(--soft);
      }

      .sys-dev {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .sys-dev summary { cursor: pointer; }
      .sys-dev-grid { margin-top: 10px; display: grid; gap: 8px; }

      @media (max-width: 1180px) {
        #app { grid-template-columns: 220px minmax(0, 1fr) 300px; }
      }

      @media (max-width: 960px) {
        #app { grid-template-columns: 1fr; }
        .rail, .system-rail { display: none; }
        .workspace { padding: 12px; }
      }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <aside class="rail">
        <div class="nav-head">
          <div class="nav-title">Axelo</div>
          <div class="brand" id="session-title">Axelo</div>
        </div>
        <button id="new-chat-btn" class="nav-action">New chat</button>
        <div class="nav-block">
          <div class="nav-label">Workspace</div>
          <div class="nav-links">
            <div class="nav-link">Projects</div>
            <div class="nav-link">Artifacts</div>
            <div class="nav-link">History</div>
          </div>
        </div>
        <div class="nav-block" style="min-height:0; flex:1;">
          <div class="nav-label">Sessions</div>
          <div id="session-list" class="nav-history"></div>
        </div>
        <div class="nav-user">Signed in as Axelo workspace</div>
      </aside>

      <main class="workspace">
        <div id="chat-root" class="workspace-card"></div>
      </main>

      <aside class="system-rail">
        <div id="system-root"></div>
      </aside>
    </div>
  </body>
</html>
