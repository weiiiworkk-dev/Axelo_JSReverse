<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axelo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:          #ffffff;
        --welcome-bg:  #f5f4f0;
        --sidebar-bg:  #f7f6f2;
        --panel-bg:    #fafaf8;
        --border:      #e8e8e4;
        --border2:     #f0efec;
        --accent:      #7c3aed;
        --accent-soft: #ede9ff;
        --text:        #1a1919;
        --text2:       #6b6b6b;
        --text3:       #a0a0a0;
        --success:     #16a34a;
        --warn:        #ca8a04;
        --danger:      #dc2626;
        --hover:       rgba(0,0,0,0.045);
        --active-bg:   rgba(0,0,0,0.075);
        --font:        'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --mono:        'Courier New', Courier, monospace;
        --sb-width:    210px;
      }

      html, body { height: 100%; overflow: hidden; background: var(--bg); }

      #app {
        display: flex;
        height: 100vh;
        font-family: var(--font);
        color: var(--text);
      }

      /* ════════════════════════════════════════════
         SIDEBAR
      ════════════════════════════════════════════ */
      #sidebar {
        width: var(--sb-width);
        min-width: var(--sb-width);
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      .sb-topnav {
        display: flex;
        align-items: center;
        padding: 8px 8px 6px;
        gap: 1px;
        flex-shrink: 0;
      }

      .sb-icon-btn {
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 7px;
        color: var(--text2);
        transition: background 0.12s;
        flex-shrink: 0;
      }

      .sb-icon-btn:hover { background: var(--hover); }
      .sb-icon-btn svg { width: 15px; height: 15px; }
      .sb-topnav-spacer { flex: 1; }

      .sb-chat-head {
        display: flex;
        align-items: center;
        padding: 2px 10px 4px;
        flex-shrink: 0;
        gap: 2px;
      }

      .sb-chat-title {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text);
        flex: 1;
        letter-spacing: -0.01em;
      }

      .sb-icon-btn-sm {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 6px;
        color: var(--text2);
        transition: background 0.12s;
        flex-shrink: 0;
      }

      .sb-icon-btn-sm svg { width: 13px; height: 13px; }
      .sb-icon-btn-sm:hover { background: var(--hover); }

      #new-session-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 8px;
        padding: 7px 10px;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font);
        font-size: 13.5px;
        font-weight: 400;
        transition: background 0.12s;
        text-align: left;
        flex-shrink: 0;
      }

      #new-session-btn:hover { background: var(--hover); }
      #new-session-btn svg { width: 14px; height: 14px; color: var(--text2); flex-shrink: 0; }

      .sb-nav { padding: 0 8px; flex-shrink: 0; }

      .sb-nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 9px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13.5px;
        color: var(--text);
        text-decoration: none;
        transition: background 0.12s;
        user-select: none;
      }

      .sb-nav-item:hover { background: var(--hover); }
      .sb-nav-item svg { width: 15px; height: 15px; color: var(--text2); flex-shrink: 0; }

      .sb-section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        padding: 10px 16px 3px;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .sb-recents {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 0 8px 6px;
      }

      .sb-recents::-webkit-scrollbar { width: 3px; }
      .sb-recents::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

      #session-list { display: flex; flex-direction: column; gap: 1px; }

      .sb-session-item {
        display: flex;
        align-items: center;
        padding: 5px 9px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s;
        min-width: 0;
      }

      .sb-session-item:hover { background: var(--hover); }
      .sb-session-item.active { background: var(--active-bg); }

      .sb-session-id {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12.5px;
        color: var(--text2);
      }

      .sb-footer {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 9px 10px;
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .sb-user-avatar {
        width: 27px;
        height: 27px;
        border-radius: 50%;
        background: var(--accent-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
      }

      .sb-user-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .conn-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--border);
        transition: background 0.3s;
        flex-shrink: 0;
      }

      .conn-dot.live { background: var(--success); box-shadow: 0 0 5px var(--success); }

      /* ════════════════════════════════════════════
         WORKSPACE
      ════════════════════════════════════════════ */
      #workspace {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        position: relative;
      }

      /* ════════════════════════════════════════════
         WELCOME VIEW  (shown when phase === welcome)
      ════════════════════════════════════════════ */
      #welcome-view {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--welcome-bg);
      }

      .wv-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 640px;
        padding: 0 24px;
      }

      /* ── Logo ── */
      .wv-logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .wv-star {
        width: 34px;
        height: 34px;
        color: #cb5a3c;
        flex-shrink: 0;
      }

      .wv-title {
        font-size: 28px;
        font-weight: 400;
        color: var(--text);
        letter-spacing: -0.02em;
        line-height: 1;
      }

      /* ── Big input box ── */
      .wv-input-box {
        width: 100%;
        background: var(--bg);
        border: 1px solid #dddbd7;
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        overflow: hidden;
        transition: box-shadow 0.15s;
      }

      .wv-input-box:focus-within {
        box-shadow: 0 2px 12px rgba(0,0,0,0.10);
        border-color: #c8c5c0;
      }

      #welcome-textarea {
        display: block;
        width: 100%;
        font-family: var(--font);
        font-size: 15px;
        color: var(--text);
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        padding: 16px 18px 10px;
        line-height: 1.55;
        min-height: 58px;
        max-height: 200px;
        overflow-y: auto;
      }

      #welcome-textarea::placeholder { color: var(--text3); }

      .wv-input-toolbar {
        display: flex;
        align-items: center;
        padding: 8px 12px 10px;
        gap: 8px;
        border-top: 1px solid var(--border2);
      }

      .wv-add-btn {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: transparent;
        cursor: pointer;
        color: var(--text2);
        font-size: 18px;
        line-height: 1;
        transition: background 0.12s;
        flex-shrink: 0;
      }

      .wv-add-btn:hover { background: var(--hover); }

      .wv-toolbar-spacer { flex: 1; }

      .wv-model-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-family: var(--font);
        font-size: 13px;
        color: var(--text2);
        padding: 4px 6px;
        border-radius: 6px;
        transition: background 0.12s;
      }

      .wv-model-btn:hover { background: var(--hover); }

      .wv-model-chevron {
        width: 12px;
        height: 12px;
        opacity: 0.6;
      }

      .wv-mic-btn {
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 50%;
        color: var(--text2);
        transition: background 0.12s;
        flex-shrink: 0;
      }

      .wv-mic-btn:hover { background: var(--hover); }
      .wv-mic-btn svg { width: 16px; height: 16px; }

      /* ── Action buttons row ── */
      .wv-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .wv-action-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: 100px;
        background: var(--bg);
        cursor: pointer;
        font-family: var(--font);
        font-size: 13px;
        color: var(--text);
        transition: background 0.12s, border-color 0.12s;
        white-space: nowrap;
      }

      .wv-action-btn:hover {
        background: var(--hover);
        border-color: #ccc8c3;
      }

      .wv-action-btn svg { width: 14px; height: 14px; color: var(--text2); flex-shrink: 0; }

      /* ════════════════════════════════════════════
         PANELS (shown when phase !== welcome)
      ════════════════════════════════════════════ */
      #main {
        flex: 1;
        display: none;   /* shown by JS when phase changes */
        overflow: hidden;
        min-height: 0;
      }

      /* ── Center panel (chat / timeline) — flex:1, leftmost ── */
      #right-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        font-family: var(--font);
      }

      /* ── Right panel (contract) — fixed width, rightmost ── */
      #left-panel {
        width: 280px;
        min-width: 240px;
        background: var(--panel-bg);
        border-left: 1px solid var(--border);
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        font-family: var(--font);
        order: 2;   /* forces it to appear after right-panel */
      }

      #left-panel::-webkit-scrollbar { width: 4px; }
      #left-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* ════════════════════════════════════════════
         BOTTOM BAR (shown when phase !== welcome)
      ════════════════════════════════════════════ */
      #bottom {
        flex-shrink: 0;
        background: var(--bg);
        border-top: 1px solid var(--border);
        display: none;   /* shown by JS when phase changes */
      }

      #readiness-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px 16px;
        border-bottom: 1px solid var(--border2);
        font-size: 11.5px;
        background: var(--panel-bg);
      }

      #readiness-label {
        white-space: nowrap;
        min-width: 80px;
        color: var(--text2);
        font-size: 11.5px;
      }

      #readiness-bar-bg {
        flex: 1;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      #readiness-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        transition: width 0.5s, background 0.5s;
        background: var(--danger);
      }

      #readiness-status {
        white-space: nowrap;
        min-width: 100px;
        font-size: 11.5px;
        color: var(--warn);
      }

      #main-start-btn {
        font-family: var(--font);
        font-size: 12px;
        font-weight: 500;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 5px 16px;
        cursor: pointer;
        border-radius: 7px;
        white-space: nowrap;
        flex-shrink: 0;
        display: none;
        transition: opacity 0.15s;
      }

      #main-start-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      #main-start-btn:not(:disabled):hover { opacity: 0.88; }

      #input-row {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        gap: 10px;
        background: var(--bg);
      }

      #main-input {
        flex: 1;
        font-family: var(--font);
        font-size: 13.5px;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        resize: none;
        padding: 0;
        line-height: 1.55;
      }

      #main-input::placeholder { color: var(--text3); }

      #main-send-btn {
        font-family: var(--font);
        font-size: 12px;
        font-weight: 500;
        background: transparent;
        color: var(--text2);
        border: 1px solid var(--border);
        padding: 5px 16px;
        cursor: pointer;
        flex-shrink: 0;
        border-radius: 7px;
        transition: background 0.12s;
      }

      #main-send-btn:hover { background: var(--hover); }
      #main-send-btn:disabled { color: var(--border); cursor: not-allowed; }

      /* ════════════════════════════════════════════
         CHAT PANEL
      ════════════════════════════════════════════ */
      .cp-root { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

      .cp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
      }

      .cp-title { font-size: 12px; font-weight: 600; color: var(--text); }

      .cp-phase-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 10px;
        color: var(--accent);
        background: var(--accent-soft);
        border-radius: 100px;
      }

      .cp-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cp-messages::-webkit-scrollbar { width: 3px; }
      .cp-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .cp-welcome-msg {
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel-bg);
        border: 1px solid var(--border);
        font-size: 13px;
        color: var(--text2);
        line-height: 1.75;
      }

      .cp-welcome-icon { font-size: 22px; margin-bottom: 8px; display: block; }
      .cp-welcome-text { font-size: 13px; color: var(--text2); line-height: 1.75; }

      .cp-msg { display: flex; font-size: 13px; }
      .cp-msg-user { justify-content: flex-end; }
      .cp-msg-assistant { justify-content: flex-start; }

      .cp-msg-bubble { max-width: 85%; line-height: 1.6; padding: 8px 14px; border-radius: 10px; }
      .cp-msg-user-bubble { background: var(--accent-soft); color: var(--text); }
      .cp-msg-ai-bubble   { background: #f4f4f2; color: var(--text); }

      .cp-ai-spinner {
        display: flex;
        align-items: center;
        padding: 6px 20px;
        gap: 4px;
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text3);
      }

      .cp-spinner-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--accent);
        animation: cp-bounce 1.2s infinite;
      }

      .cp-spinner-dot:nth-child(2) { animation-delay: 0.2s; }
      .cp-spinner-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes cp-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

      .cp-error {
        padding: 6px 20px;
        font-size: 11px;
        color: var(--danger);
        background: #fff5f5;
        border-top: 1px solid #ffe4e4;
        flex-shrink: 0;
      }

      .cp-gap-header    { font-size: 11px; font-weight: 700; color: var(--danger); display: block; margin-bottom: 2px; }
      .cp-blocking-item { font-size: 11px; color: var(--danger); display: block; padding-left: 6px; }
      .cp-missing-item  { font-size: 11px; color: var(--warn);   display: block; padding-left: 6px; }

      /* ════════════════════════════════════════════
         MISSION CONTRACT PANEL
      ════════════════════════════════════════════ */
      .mcp-root { display: flex; flex-direction: column; height: 100%; font-family: var(--font); }
      .mcp-locked { opacity: 0.85; }

      .mcp-header {
        background: var(--panel-bg);
        padding: 9px 14px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .mcp-logo    { color: var(--accent); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; }
      .mcp-subtitle { color: var(--text3); font-size: 9.5px; margin-top: 1px; }

      .mcp-version-badge {
        font-size: 9.5px;
        color: var(--text3);
        border: 1px solid var(--border);
        padding: 1px 7px;
        border-radius: 4px;
        background: var(--bg);
      }

      .mcp-conf-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
      }

      .mcp-conf-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .mcp-conf-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .mcp-conf-label { font-size: 10px; font-weight: 600; white-space: nowrap; color: var(--text2); }

      .mcp-section { padding: 10px 14px; border-bottom: 1px solid var(--border2); }
      .mcp-section.mcp-delta { animation: mcp-flash 1.5s ease-out; }
      @keyframes mcp-flash { 0%,100%{background:transparent} 30%{background:rgba(124,58,237,0.05)} }
      .mcp-section-warn { background: #fffdf0; }

      .mcp-section-title {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text3);
        margin-bottom: 5px;
      }

      .mcp-val       { font-size: 12px; color: var(--text);  line-height: 1.5; }
      .mcp-url       { font-family: var(--mono); font-size: 11px; word-break: break-all; color: var(--accent); }
      .mcp-meta      { font-size: 10px; color: var(--text3); margin-top: 2px; }
      .mcp-objective { font-size: 12px; color: var(--text);  line-height: 1.6; }

      .mcp-badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 2px 7px;
        margin-top: 4px;
        border: 1px solid;
        border-radius: 4px;
      }

      .mcp-badge-extract_data     { border-color: var(--accent);  color: var(--accent);  }
      .mcp-badge-reverse_engineer { border-color: #6d28d9;        color: #6d28d9;        }
      .mcp-badge-crawl            { border-color: var(--success); color: var(--success); }
      .mcp-badge-monitor          { border-color: #9b59b6;        color: #9b59b6;        }

      .mcp-fields-list { display: flex; flex-direction: column; gap: 4px; }
      .mcp-field-row   { display: flex; align-items: center; gap: 6px; font-size: 12px; }
      .mcp-field-name  { font-weight: 600; color: var(--text); flex: 1; }
      .mcp-field-type  { font-size: 10px; font-family: var(--mono); color: var(--text2); }
      .mcp-field-req   { font-size: 9px; border: 1px solid var(--accent); color: var(--accent); padding: 0 4px; font-weight: 700; border-radius: 3px; }
      .mcp-field-opt   { font-size: 9px; color: var(--text3); padding: 0 4px; border: 1px solid var(--border); border-radius: 3px; }

      .mcp-chips { display: flex; flex-wrap: wrap; gap: 4px; }
      .mcp-chip  { font-size: 10px; background: var(--border2); border: 1px solid var(--border); padding: 2px 7px; color: var(--text2); border-radius: 4px; }

      .mcp-assumption { font-size: 11px; color: var(--text2); line-height: 1.55; }
      .mcp-gap        { font-size: 11px; color: var(--warn);  line-height: 1.55; }

      .mcp-placeholder {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px;
        gap: 14px;
      }

      .mcp-ph-icon  { font-size: 26px; opacity: 0.35; }
      .mcp-ph-text  { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.8; }
      .mcp-empty-section { opacity: 0.5; }
      .mcp-empty-hint    { font-size: 11px; color: var(--text3); font-style: italic; }

      .mcp-locked-banner {
        text-align: center;
        padding: 8px 14px;
        font-size: 11px;
        color: var(--accent);
        border-top: 1px solid var(--border2);
        flex-shrink: 0;
        background: var(--accent-soft);
      }

      .mcp-ready-line {
        padding: 9px 14px;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        border-top: 1px solid var(--border2);
        background: var(--accent-soft);
      }

      /* ════════════════════════════════════════════
         EXECUTION TIMELINE PANEL
      ════════════════════════════════════════════ */
      .etp-root {
        display: flex;
        flex-direction: column;
        height: 100%;
        color: var(--text);
        font-family: var(--font);
        background: var(--bg);
      }

      .etp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .etp-title      { font-size: 12px; font-weight: 600; color: var(--text); }
      .etp-step-badge { font-size: 10px; border: 1px solid var(--border); color: var(--text2); padding: 2px 9px; border-radius: 100px; }

      .etp-coverage-strip {
        display: grid;
        grid-template-columns: repeat(4,1fr);
        gap: 4px 8px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
      }

      .etp-cov-item    { display: flex; flex-direction: column; gap: 3px; }
      .etp-cov-name    { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
      .etp-cov-bar-bg  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .etp-cov-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .etp-cov-pct     { font-size: 9px; color: var(--text2); }

      .etp-trust-row {
        display: flex;
        gap: 10px;
        padding: 6px 16px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
      }

      .etp-trust-item    { flex: 1; display: flex; align-items: center; gap: 6px; }
      .etp-trust-lbl     { font-size: 9px; color: var(--text3); width: 30px; flex-shrink: 0; }
      .etp-trust-bar-bg  { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .etp-trust-fill    { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .etp-trust-pct     { font-size: 9px; color: var(--text2); width: 24px; text-align: right; }

      .etp-timeline {
        flex: 1;
        overflow-y: auto;
        padding: 10px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .etp-timeline::-webkit-scrollbar { width: 3px; }
      .etp-timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      .etp-empty-hint { font-size: 12px; color: var(--text3); text-align: center; padding: 28px; }

      .etp-entry {
        display: flex;
        gap: 10px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--bg);
      }

      .etp-entry-active { border-color: var(--accent); background: var(--accent-soft); }
      .etp-entry-done   { border-color: var(--success); background: #f0fdf4; }
      .etp-entry-failed { border-color: var(--danger);  background: #fff5f5; }

      .etp-entry-status { font-size: 13px; flex-shrink: 0; width: 16px; text-align: center; color: var(--text2); }
      .etp-entry-active .etp-entry-status { color: var(--accent); animation: etp-spin 1.5s linear infinite; }
      .etp-entry-done   .etp-entry-status { color: var(--success); }
      .etp-entry-failed .etp-entry-status { color: var(--danger);  }

      @keyframes etp-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

      .etp-entry-body   { flex: 1; min-width: 0; }
      .etp-entry-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
      .etp-entry-icon   { font-size: 13px; flex-shrink: 0; }
      .etp-entry-obj    { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
      .etp-entry-role   { font-size: 10px; color: var(--text3); white-space: nowrap; }
      .etp-entry-summary { font-size: 11px; color: var(--text2); line-height: 1.5; }
      .etp-entry-risk    { font-size: 11px; color: var(--warn); margin-top: 3px; }

      .etp-verdict-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 14px;
        border: 2px solid;
        border-radius: 10px;
        background: var(--bg);
        margin-top: 6px;
      }

      .etp-verdict-icon { font-size: 18px; flex-shrink: 0; }
      .etp-verdict-tier { font-size: 13px; font-weight: 700; }
      .etp-verdict-msg  { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.5; }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">

      <!-- ════════════════ SIDEBAR ════════════════ -->
      <div id="sidebar">
        <div class="sb-topnav">
          <button class="sb-icon-btn" title="菜单">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <line x1="2" y1="4.5"  x2="14" y2="4.5"/>
              <line x1="2" y1="8"    x2="14" y2="8"/>
              <line x1="2" y1="11.5" x2="14" y2="11.5"/>
            </svg>
          </button>
          <button class="sb-icon-btn" title="所有任务">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="2" y="2" width="5" height="5" rx="1"/>
              <rect x="9" y="2" width="5" height="5" rx="1"/>
              <rect x="2" y="9" width="5" height="5" rx="1"/>
              <rect x="9" y="9" width="5" height="5" rx="1"/>
            </svg>
          </button>
          <button class="sb-icon-btn" title="搜索">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="7"  cy="7"  r="4"/>
              <line   x1="10.5" y1="10.5" x2="14" y2="14"/>
            </svg>
          </button>
          <div class="sb-topnav-spacer"></div>
          <button class="sb-icon-btn" title="后退">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <polyline points="10,3 5,8 10,13"/>
            </svg>
          </button>
          <button class="sb-icon-btn" title="前进">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <polyline points="6,3 11,8 6,13"/>
            </svg>
          </button>
        </div>

        <div class="sb-chat-head">
          <span class="sb-chat-title">Chat</span>
          <button class="sb-icon-btn-sm" title="整理">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <line x1="2"  y1="5"  x2="14" y2="5"/>
              <line x1="4"  y1="8"  x2="12" y2="8"/>
              <line x1="6"  y1="11" x2="10" y2="11"/>
            </svg>
          </button>
          <button class="sb-icon-btn-sm" title="筛选">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <polyline points="2,3 14,3 9,9 9,14 7,14 7,9"/>
            </svg>
          </button>
        </div>

        <button id="new-session-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <line x1="8" y1="2" x2="8" y2="14"/>
            <line x1="2" y1="8" x2="14" y2="8"/>
          </svg>
          新会话
        </button>

        <div class="sb-nav">
          <div class="sb-nav-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="2" y="2" width="12" height="12" rx="2"/>
              <line x1="5" y1="8" x2="11" y2="8"/>
              <line x1="8" y1="5" x2="8"  y2="11"/>
            </svg>
            任务档案
          </div>
          <div class="sb-nav-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="8" cy="8" r="5"/>
              <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            配置
          </div>
          <div class="sb-nav-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="2" y="4" width="12" height="9" rx="1.5"/>
              <polyline points="5,4 8,2 11,4"/>
            </svg>
            分析结果
          </div>
        </div>

        <div class="sb-section-label">Pinned</div>
        <div class="sb-section-label">Recents</div>

        <div class="sb-recents">
          <div id="session-list"></div>
        </div>

        <div class="sb-footer">
          <div class="sb-user-avatar">A</div>
          <span class="sb-user-name">Axelo</span>
          <div class="conn-dot" id="conn-dot" title="连接状态"></div>
        </div>
      </div>
      <!-- /SIDEBAR -->

      <!-- ════════════════ WORKSPACE ════════════════ -->
      <div id="workspace">

        <!-- ── Welcome View ── -->
        <div id="welcome-view">
          <div class="wv-center">

            <!-- Logo -->
            <div class="wv-logo">
              <!-- 8-arm starburst matching Claude.ai asterisk style -->
              <svg class="wv-star" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="16" y1="1"    x2="16" y2="31"   stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
                <line x1="1"  y1="16"   x2="31" y2="16"   stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
                <line x1="5.5" y1="5.5" x2="26.5" y2="26.5" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
                <line x1="26.5" y1="5.5" x2="5.5" y2="26.5" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
              </svg>
              <h1 class="wv-title">Axelo</h1>
            </div>

            <!-- Big input box -->
            <div class="wv-input-box">
              <textarea
                id="welcome-textarea"
                placeholder="告诉 Axelo 你想做什么..."
                rows="1"
              ></textarea>
              <div class="wv-input-toolbar">
                <button class="wv-add-btn" title="附件">+</button>
                <div class="wv-toolbar-spacer"></div>
                <button class="wv-model-btn" id="welcome-model-btn">
                  就绪度 0%
                  <svg class="wv-model-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="2,4 6,8 10,4"/>
                  </svg>
                </button>
                <button class="wv-mic-btn" title="语音输入">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="5.5" y="1" width="5" height="8" rx="2.5"/>
                    <path d="M3 8a5 5 0 0 0 10 0"/>
                    <line x1="8" y1="13" x2="8" y2="15"/>
                    <line x1="5" y1="15" x2="11" y2="15"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Quick action buttons -->
            <div class="wv-actions">
              <button class="wv-action-btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="8" cy="8" r="6"/>
                  <line x1="2" y1="8" x2="14" y2="8"/>
                  <path d="M8 2 Q10 8 8 14"/>
                  <path d="M8 2 Q6 8 8 14"/>
                </svg>
                分析网站
              </button>
              <button class="wv-action-btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                  <polyline points="4,6 2,8 4,10"/>
                  <polyline points="12,6 14,8 12,10"/>
                  <line x1="9" y1="4" x2="7" y2="12"/>
                </svg>
                逆向 API
              </button>
              <button class="wv-action-btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="2" width="12" height="12" rx="2"/>
                  <line x1="5" y1="6"  x2="11" y2="6"/>
                  <line x1="5" y1="9"  x2="11" y2="9"/>
                  <line x1="5" y1="12" x2="8"  y2="12"/>
                </svg>
                提取数据
              </button>
              <button class="wv-action-btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M4 2 L4 14 L12 14 L12 6 L8 2 Z"/>
                  <polyline points="8,2 8,6 12,6"/>
                </svg>
                生成脚本
              </button>
            </div>

          </div>
        </div>
        <!-- /Welcome View -->

        <!-- ── Panels (chat center + contract right) ── -->
        <div id="main">
          <div id="right-panel"></div>   <!-- chat / timeline — center -->
          <div id="left-panel"></div>    <!-- contract — right -->
        </div>

        <!-- ── Bottom bar ── -->
        <div id="bottom">
          <div id="readiness-row">
            <span id="readiness-label">就绪度：0%</span>
            <div id="readiness-bar-bg">
              <div id="readiness-bar-fill"></div>
            </div>
            <span id="readiness-status">需要更多信息</span>
            <button id="main-start-btn" disabled>开始任务</button>
          </div>
          <div id="input-row">
            <textarea
              id="main-input"
              rows="1"
              placeholder="继续告诉 Axelo 更多细节..."
            ></textarea>
            <button id="main-send-btn">发送</button>
          </div>
        </div>

      </div>
      <!-- /WORKSPACE -->

      <!-- Hidden elements for JS wiring -->
      <select id="session-select" style="display:none"><option value="">-- 选择 --</option></select>
      <span   id="conn-label"    style="display:none">离线</span>

    </div>
  </body>
