<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axelo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:          #ffffff;
        --welcome-bg:  #f5f4f0;
        --sidebar-bg:  #f9f9f7;
        --panel-bg:    #fafaf8;
        --border:      #e8e8e4;
        --border2:     #f0efec;
        --accent:      #7c3aed;
        --accent-soft: #ede9ff;
        --text:        #1a1919;
        --text2:       #6b6b6b;
        --text3:       #a8a8a8;
        --success:     #16a34a;
        --warn:        #ca8a04;
        --danger:      #dc2626;
        --hover:       rgba(0,0,0,0.05);
        --active-bg:   rgba(0,0,0,0.08);
        --font:        'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --mono:        'Courier New', Courier, monospace;
        --sb-width:    220px;
        --rc-width:    260px;
      }

      html, body { height: 100%; overflow: hidden; background: var(--bg); }

      #app {
        display: flex;
        height: 100vh;
        font-family: var(--font);
        color: var(--text);
      }

      /* ════════════════════════════════════════════
         SIDEBAR — exact match to screenshot
      ════════════════════════════════════════════ */
      #sidebar {
        width: var(--sb-width);
        min-width: var(--sb-width);
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      /* ── Top "Chat" heading row ── */
      .sb-head {
        display: flex;
        align-items: center;
        padding: 12px 14px 6px;
        gap: 6px;
        flex-shrink: 0;
      }

      .sb-head-chat-icon {
        width: 18px; height: 18px;
        color: var(--text);
        flex-shrink: 0;
      }

      .sb-head-title {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text);
        flex: 1;
        letter-spacing: -0.01em;
      }

      .sb-head-btn {
        width: 26px; height: 26px;
        display: flex; align-items: center; justify-content: center;
        border: none; background: transparent; cursor: pointer;
        border-radius: 6px; color: var(--text2);
        transition: background 0.12s; flex-shrink: 0;
      }

      .sb-head-btn:hover { background: var(--hover); }
      .sb-head-btn svg { width: 14px; height: 14px; }

      /* ── New chat button ── */
      #new-session-btn {
        display: flex; align-items: center;
        gap: 10px;
        margin: 6px 8px 2px;
        padding: 7px 10px;
        border: none; background: transparent;
        cursor: pointer; border-radius: 8px;
        color: var(--text); font-family: var(--font);
        font-size: 13.5px; font-weight: 400;
        transition: background 0.12s;
        text-align: left; flex-shrink: 0;
      }

      #new-session-btn:hover { background: var(--hover); }

      .sb-new-icon {
        width: 16px; height: 16px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text2); flex-shrink: 0;
      }

      .sb-new-icon svg { width: 14px; height: 14px; }

      /* ── Nav items ── */
      .sb-nav { padding: 2px 8px 0; flex-shrink: 0; }

      .sb-nav-item {
        display: flex; align-items: center;
        gap: 10px;
        padding: 6px 9px;
        border-radius: 8px; cursor: pointer;
        font-size: 13.5px; color: var(--text);
        text-decoration: none;
        transition: background 0.12s; user-select: none;
      }

      .sb-nav-item:hover { background: var(--hover); }

      .sb-nav-icon {
        width: 16px; height: 16px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text2); flex-shrink: 0;
      }

      .sb-nav-icon svg { width: 15px; height: 15px; }

      /* ── Section labels ── */
      .sb-section-label {
        font-size: 11px; font-weight: 500;
        color: var(--text3);
        padding: 12px 18px 4px;
        letter-spacing: 0.01em;
        flex-shrink: 0;
      }

      /* ── Drag to pin placeholder ── */
      .sb-drag-pin {
        display: flex; align-items: center;
        gap: 10px;
        padding: 5px 18px;
        font-size: 13px; color: var(--text3);
        flex-shrink: 0; cursor: default;
      }

      .sb-drag-pin svg { width: 13px; height: 13px; }

      /* ── Session list ── */
      .sb-recents {
        flex: 1; overflow-y: auto; overflow-x: hidden;
        padding: 2px 8px 6px;
      }

      .sb-recents::-webkit-scrollbar { width: 3px; }
      .sb-recents::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

      #session-list { display: flex; flex-direction: column; gap: 0; }

      .sb-session-item {
        display: flex; align-items: center;
        padding: 4px 10px;
        border-radius: 6px; cursor: pointer;
        transition: background 0.12s; min-width: 0;
      }

      .sb-session-item:hover { background: var(--hover); }
      .sb-session-item.active { background: var(--active-bg); }

      .sb-session-id {
        flex: 1; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
        font-size: 13px; color: var(--text);
        line-height: 1.4;
      }

      /* ── Footer ── */
      .sb-footer {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 10px 14px;
        display: flex; align-items: center; gap: 9px;
      }

      .sb-user-icon {
        width: 26px; height: 26px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text2); flex-shrink: 0;
      }

      .sb-user-icon svg { width: 22px; height: 22px; }

      .sb-user-name {
        flex: 1; font-size: 13px; font-weight: 500;
        color: var(--text); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }

      .sb-download-btn {
        width: 26px; height: 26px;
        display: flex; align-items: center; justify-content: center;
        border: none; background: transparent;
        cursor: pointer; border-radius: 5px; color: var(--text2);
        transition: background 0.12s; flex-shrink: 0;
      }

      .sb-download-btn:hover { background: var(--hover); }
      .sb-download-btn svg { width: 14px; height: 14px; }

      /* Connection dot (hidden, keep for JS) */
      .conn-dot { display: none; }
      .conn-dot.live { display: none; }

      /* ════════════════════════════════════════════
         WORKSPACE
      ════════════════════════════════════════════ */
      #workspace {
        flex: 1; min-width: 0;
        display: flex; flex-direction: column;
        overflow: hidden; background: var(--bg);
        position: relative;
      }

      /* ════════════════════════════════════════════
         WELCOME VIEW
      ════════════════════════════════════════════ */
      #welcome-view {
        position: absolute; inset: 0; z-index: 10;
        display: flex; align-items: center; justify-content: center;
        background: var(--welcome-bg);
      }

      .wv-center {
        display: flex; flex-direction: column;
        align-items: center; gap: 20px;
        width: 100%; max-width: 640px; padding: 0 24px;
      }

      .wv-title {
        font-size: 28px; font-weight: 400;
        color: var(--text); letter-spacing: -0.02em; line-height: 1;
      }

      /* ── Big input box ── */
      .wv-input-box {
        width: 100%; background: var(--bg);
        border: 1px solid #dddbd7; border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        transition: box-shadow 0.15s;
      }

      .wv-input-box:focus-within {
        box-shadow: 0 2px 12px rgba(0,0,0,0.10);
        border-color: #c8c5c0;
      }

      #welcome-textarea {
        display: block; width: 100%;
        font-family: var(--font); font-size: 15px;
        color: var(--text); background: transparent;
        border: none; outline: none; resize: none;
        padding: 16px 18px 10px;
        line-height: 1.55; min-height: 58px; max-height: 200px;
        overflow-y: auto;
      }

      #welcome-textarea::placeholder { color: var(--text3); }

      .wv-input-toolbar {
        display: flex; align-items: center;
        padding: 8px 12px 10px; gap: 8px;
        border-top: 1px solid var(--border2);
      }

      .wv-add-btn {
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--border); border-radius: 50%;
        background: transparent; cursor: pointer;
        color: var(--text2); font-size: 18px; line-height: 1;
        transition: background 0.12s; flex-shrink: 0;
      }

      .wv-add-btn:hover { background: var(--hover); }
      .wv-toolbar-spacer { flex: 1; }

      .wv-model-btn {
        display: flex; align-items: center; gap: 4px;
        border: none; background: transparent; cursor: pointer;
        font-family: var(--font); font-size: 13px; color: var(--text2);
        padding: 4px 6px; border-radius: 6px; transition: background 0.12s;
      }

      .wv-model-btn:hover { background: var(--hover); }
      .wv-model-chevron { width: 12px; height: 12px; opacity: 0.6; }

      .wv-mic-btn {
        width: 30px; height: 30px;
        display: flex; align-items: center; justify-content: center;
        border: none; background: transparent; cursor: pointer;
        border-radius: 50%; color: var(--text2); transition: background 0.12s;
      }

      .wv-mic-btn:hover { background: var(--hover); }
      .wv-mic-btn svg { width: 16px; height: 16px; }

      /* ── Action buttons ── */
      .wv-actions {
        display: flex; align-items: center;
        gap: 8px; flex-wrap: wrap; justify-content: center;
      }

      .wv-action-btn {
        display: flex; align-items: center; gap: 6px;
        padding: 7px 14px;
        border: 1px solid var(--border); border-radius: 100px;
        background: var(--bg); cursor: pointer;
        font-family: var(--font); font-size: 13px; color: var(--text);
        transition: background 0.12s, border-color 0.12s; white-space: nowrap;
      }

      .wv-action-btn:hover { background: var(--hover); border-color: #ccc8c3; }
      .wv-action-btn svg { width: 14px; height: 14px; color: var(--text2); flex-shrink: 0; }

      /* ════════════════════════════════════════════
         PANELS ROW
      ════════════════════════════════════════════ */
      #main {
        flex: 1; display: none;
        overflow: hidden; min-height: 0;
      }

      /* ── Center panel (chat) ── */
      #right-panel {
        flex: 1; min-width: 0;
        display: flex; flex-direction: column;
        overflow: hidden; background: var(--bg);
        font-family: var(--font);
      }

      /* ── Right card wrapper ── */
      #right-card {
        width: var(--rc-width);
        min-width: 220px;
        background: var(--sidebar-bg);
        border-left: 1px solid var(--border);
        display: flex; flex-direction: column;
        overflow: hidden; flex-shrink: 0;
        font-family: var(--font);
      }

      /* Right card header — matches sidebar style */
      .rc-head {
        display: flex; align-items: center;
        padding: 12px 14px 6px; gap: 6px; flex-shrink: 0;
      }

      .rc-head-icon { width: 18px; height: 18px; color: var(--text); flex-shrink: 0; }

      .rc-head-title {
        font-size: 14.5px; font-weight: 600;
        color: var(--text); flex: 1; letter-spacing: -0.01em;
      }

      .rc-head-btn {
        width: 26px; height: 26px;
        display: flex; align-items: center; justify-content: center;
        border: none; background: transparent; cursor: pointer;
        border-radius: 6px; color: var(--text2); transition: background 0.12s;
      }

      .rc-head-btn:hover { background: var(--hover); }
      .rc-head-btn svg { width: 14px; height: 14px; }

      /* Right card section labels — same as sidebar */
      .rc-section-label {
        font-size: 11px; font-weight: 500;
        color: var(--text3); padding: 10px 16px 4px;
        letter-spacing: 0.01em; flex-shrink: 0;
      }

      /* Inner scrollable area */
      #left-panel {
        flex: 1; overflow-y: auto; overflow-x: hidden;
        display: flex; flex-direction: column;
        font-family: var(--font);
      }

      #left-panel::-webkit-scrollbar { width: 3px; }
      #left-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* ════════════════════════════════════════════
         BOTTOM BAR
      ════════════════════════════════════════════ */
      #bottom {
        flex-shrink: 0; background: var(--bg);
        border-top: 1px solid var(--border);
        display: none;
      }

      #readiness-row {
        display: flex; align-items: center; gap: 10px;
        padding: 5px 16px; border-bottom: 1px solid var(--border2);
        font-size: 11.5px; background: var(--panel-bg);
      }

      #readiness-label { white-space: nowrap; min-width: 80px; color: var(--text2); font-size: 11.5px; }

      #readiness-bar-bg {
        flex: 1; height: 4px; background: var(--border);
        border-radius: 2px; overflow: hidden;
      }

      #readiness-bar-fill {
        height: 100%; width: 0%; border-radius: 2px;
        transition: width 0.5s, background 0.5s; background: var(--danger);
      }

      #readiness-status { white-space: nowrap; min-width: 100px; font-size: 11.5px; color: var(--warn); }

      #main-start-btn {
        font-family: var(--font); font-size: 12px; font-weight: 500;
        background: var(--accent); color: #fff; border: none;
        padding: 5px 16px; cursor: pointer; border-radius: 7px;
        white-space: nowrap; flex-shrink: 0; display: none; transition: opacity 0.15s;
      }

      #main-start-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      #main-start-btn:not(:disabled):hover { opacity: 0.88; }

      #input-row {
        display: flex; align-items: center;
        padding: 8px 16px; gap: 10px; background: var(--bg);
      }

      #main-input {
        flex: 1; font-family: var(--font); font-size: 13.5px;
        border: none; outline: none; background: transparent;
        color: var(--text); resize: none; padding: 0; line-height: 1.55;
      }

      #main-input::placeholder { color: var(--text3); }

      #main-send-btn {
        font-family: var(--font); font-size: 12px; font-weight: 500;
        background: transparent; color: var(--text2);
        border: 1px solid var(--border); padding: 5px 16px;
        cursor: pointer; flex-shrink: 0; border-radius: 7px;
        transition: background 0.12s;
      }

      #main-send-btn:hover { background: var(--hover); }
      #main-send-btn:disabled { color: var(--border); cursor: not-allowed; }

      /* ════════════════════════════════════════════
         CHAT PANEL
      ════════════════════════════════════════════ */
      .cp-root { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

      .cp-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 9px 16px; border-bottom: 1px solid var(--border);
        flex-shrink: 0; background: var(--bg);
      }

      .cp-title { font-size: 12px; font-weight: 600; color: var(--text); }

      .cp-phase-badge {
        font-size: 10px; font-weight: 600; padding: 2px 10px;
        color: var(--accent); background: var(--accent-soft); border-radius: 100px;
      }

      .cp-messages {
        flex: 1; overflow-y: auto; padding: 16px 20px;
        display: flex; flex-direction: column; gap: 10px;
      }

      .cp-messages::-webkit-scrollbar { width: 3px; }
      .cp-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .cp-welcome-msg {
        padding: 14px 16px; border-radius: 10px;
        background: var(--panel-bg); border: 1px solid var(--border);
        font-size: 13px; color: var(--text2); line-height: 1.75;
      }

      .cp-welcome-icon { font-size: 22px; margin-bottom: 8px; display: block; }
      .cp-welcome-text { font-size: 13px; color: var(--text2); line-height: 1.75; }

      .cp-msg { display: flex; font-size: 13px; }
      .cp-msg-user { justify-content: flex-end; }
      .cp-msg-assistant { justify-content: flex-start; }

      .cp-msg-bubble { max-width: 85%; line-height: 1.6; padding: 8px 14px; border-radius: 10px; }
      .cp-msg-user-bubble { background: var(--accent-soft); color: var(--text); }
      .cp-msg-ai-bubble   { background: #f4f4f2; color: var(--text); }

      .cp-ai-spinner {
        display: flex; align-items: center; padding: 6px 20px;
        gap: 4px; flex-shrink: 0; font-size: 11px; color: var(--text3);
      }

      .cp-spinner-dot {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--accent); animation: cp-bounce 1.2s infinite;
      }

      .cp-spinner-dot:nth-child(2) { animation-delay: 0.2s; }
      .cp-spinner-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes cp-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

      .cp-error {
        padding: 6px 20px; font-size: 11px; color: var(--danger);
        background: #fff5f5; border-top: 1px solid #ffe4e4; flex-shrink: 0;
      }

      .cp-gap-header    { font-size: 11px; font-weight: 700; color: var(--danger); display: block; margin-bottom: 2px; }
      .cp-blocking-item { font-size: 11px; color: var(--danger); display: block; padding-left: 6px; }
      .cp-missing-item  { font-size: 11px; color: var(--warn);   display: block; padding-left: 6px; }

      /* ════════════════════════════════════════════
         MISSION CONTRACT PANEL (in right card)
      ════════════════════════════════════════════ */
      .mcp-root { display: flex; flex-direction: column; min-height: 0; font-family: var(--font); }
      .mcp-locked { opacity: 0.85; }

      /* suppress the old mcp header (right card has its own) */
      .mcp-header { display: none; }

      .mcp-conf-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 14px; border-bottom: 1px solid var(--border2); flex-shrink: 0;
      }

      .mcp-conf-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .mcp-conf-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .mcp-conf-label { font-size: 10px; font-weight: 600; white-space: nowrap; color: var(--text2); }

      .mcp-section { padding: 9px 14px; border-bottom: 1px solid var(--border2); }
      .mcp-section.mcp-delta { animation: mcp-flash 1.5s ease-out; }
      @keyframes mcp-flash { 0%,100%{background:transparent} 30%{background:rgba(124,58,237,0.05)} }
      .mcp-section-warn { background: #fffdf0; }

      .mcp-section-title {
        font-size: 9px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--text3); margin-bottom: 5px;
      }

      .mcp-val       { font-size: 12px; color: var(--text); line-height: 1.5; }
      .mcp-url       { font-family: var(--mono); font-size: 11px; word-break: break-all; color: var(--accent); }
      .mcp-meta      { font-size: 10px; color: var(--text3); margin-top: 2px; }
      .mcp-objective { font-size: 12px; color: var(--text); line-height: 1.6; }

      .mcp-badge {
        display: inline-block; font-size: 9px; font-weight: 700;
        text-transform: uppercase; padding: 2px 7px; margin-top: 4px;
        border: 1px solid; border-radius: 4px;
      }

      .mcp-badge-extract_data     { border-color: var(--accent);  color: var(--accent);  }
      .mcp-badge-reverse_engineer { border-color: #6d28d9;        color: #6d28d9;        }
      .mcp-badge-crawl            { border-color: var(--success); color: var(--success); }
      .mcp-badge-monitor          { border-color: #9b59b6;        color: #9b59b6;        }

      .mcp-fields-list { display: flex; flex-direction: column; gap: 4px; }
      .mcp-field-row   { display: flex; align-items: center; gap: 6px; font-size: 12px; }
      .mcp-field-name  { font-weight: 600; color: var(--text); flex: 1; }
      .mcp-field-type  { font-size: 10px; font-family: var(--mono); color: var(--text2); }
      .mcp-field-req   { font-size: 9px; border: 1px solid var(--accent); color: var(--accent); padding: 0 4px; font-weight: 700; border-radius: 3px; }
      .mcp-field-opt   { font-size: 9px; color: var(--text3); padding: 0 4px; border: 1px solid var(--border); border-radius: 3px; }

      .mcp-chips { display: flex; flex-wrap: wrap; gap: 4px; }
      .mcp-chip  { font-size: 10px; background: var(--border2); border: 1px solid var(--border); padding: 2px 7px; color: var(--text2); border-radius: 4px; }

      .mcp-assumption { font-size: 11px; color: var(--text2); line-height: 1.55; }
      .mcp-gap        { font-size: 11px; color: var(--warn);  line-height: 1.55; }

      .mcp-placeholder {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 24px; gap: 12px;
      }

      .mcp-ph-icon  { font-size: 24px; opacity: 0.3; }
      .mcp-ph-text  { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.8; }
      .mcp-empty-section { opacity: 0.5; }
      .mcp-empty-hint    { font-size: 11px; color: var(--text3); font-style: italic; }

      .mcp-locked-banner {
        text-align: center; padding: 8px 14px; font-size: 11px;
        color: var(--accent); border-top: 1px solid var(--border2);
        flex-shrink: 0; background: var(--accent-soft);
      }

      .mcp-ready-line {
        padding: 9px 14px; font-size: 11px; font-weight: 600;
        color: var(--accent); border-top: 1px solid var(--border2);
        background: var(--accent-soft);
      }

      /* ════════════════════════════════════════════
         EXECUTION TIMELINE (in right card)
      ════════════════════════════════════════════ */
      .etp-root {
        display: flex; flex-direction: column;
        color: var(--text); font-family: var(--font); background: transparent;
      }

      /* suppress the old etp header */
      .etp-header { display: none; }

      .etp-coverage-strip {
        display: grid; grid-template-columns: repeat(4,1fr);
        gap: 4px 8px; padding: 8px 14px;
        border-bottom: 1px solid var(--border2); flex-shrink: 0;
      }

      .etp-cov-item    { display: flex; flex-direction: column; gap: 3px; }
      .etp-cov-name    { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
      .etp-cov-bar-bg  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .etp-cov-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .etp-cov-pct     { font-size: 9px; color: var(--text2); }

      .etp-trust-row { display: flex; gap: 10px; padding: 6px 14px; border-bottom: 1px solid var(--border2); flex-shrink: 0; }
      .etp-trust-item    { flex: 1; display: flex; align-items: center; gap: 6px; }
      .etp-trust-lbl     { font-size: 9px; color: var(--text3); width: 30px; flex-shrink: 0; }
      .etp-trust-bar-bg  { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
      .etp-trust-fill    { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
      .etp-trust-pct     { font-size: 9px; color: var(--text2); width: 24px; text-align: right; }

      .etp-timeline {
        overflow-y: auto; padding: 8px 10px;
        display: flex; flex-direction: column; gap: 5px;
      }

      .etp-timeline::-webkit-scrollbar { width: 3px; }
      .etp-timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      .etp-empty-hint { font-size: 12px; color: var(--text3); text-align: center; padding: 20px; }

      .etp-entry {
        display: flex; gap: 8px; padding: 7px 10px;
        border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
      }

      .etp-entry-active { border-color: var(--accent); background: var(--accent-soft); }
      .etp-entry-done   { border-color: var(--success); background: #f0fdf4; }
      .etp-entry-failed { border-color: var(--danger);  background: #fff5f5; }

      .etp-entry-status { font-size: 12px; flex-shrink: 0; width: 14px; text-align: center; color: var(--text2); }
      .etp-entry-active .etp-entry-status { color: var(--accent); animation: etp-spin 1.5s linear infinite; }
      .etp-entry-done   .etp-entry-status { color: var(--success); }
      .etp-entry-failed .etp-entry-status { color: var(--danger);  }

      @keyframes etp-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

      .etp-entry-body    { flex: 1; min-width: 0; }
      .etp-entry-header  { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
      .etp-entry-icon    { font-size: 12px; flex-shrink: 0; }
      .etp-entry-obj     { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
      .etp-entry-role    { font-size: 10px; color: var(--text3); white-space: nowrap; }
      .etp-entry-summary { font-size: 11px; color: var(--text2); line-height: 1.5; }
      .etp-entry-risk    { font-size: 11px; color: var(--warn); margin-top: 2px; }

      .etp-verdict-row {
        display: flex; align-items: flex-start; gap: 8px;
        padding: 8px 10px; border: 2px solid; border-radius: 9px;
        background: var(--bg); margin-top: 5px;
      }

      .etp-verdict-icon { font-size: 16px; flex-shrink: 0; }
      .etp-verdict-tier { font-size: 12px; font-weight: 700; }
      .etp-verdict-msg  { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

      /* ════════════════════════════════════════════
         RIGHT PANEL CONTROLLER
      ════════════════════════════════════════════ */
      #rp-container {
        flex: 1; overflow-y: auto; overflow-x: hidden;
        display: flex; flex-direction: column;
        padding: 8px; gap: 8px;
      }

      #rp-container::-webkit-scrollbar { width: 3px; }
      #rp-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* Slot wrappers — each holds exactly one card */
      #rp-slot-goal, #rp-slot-plan, #rp-slot-checkpoint, #rp-slot-timeline {
        display: flex; flex-direction: column; flex-shrink: 0;
      }

      #rp-slot-goal:empty, #rp-slot-plan:empty,
      #rp-slot-checkpoint:empty, #rp-slot-timeline:empty { display: none; }

      /* ── Base card ── */
      .rp-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg);
        overflow: hidden;
      }

      .rp-card--empty {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 18px 16px; gap: 6px; opacity: 0.45;
      }

      .rp-card__empty-icon { font-size: 16px; color: var(--text3); }
      .rp-card__empty-label { font-size: 11.5px; color: var(--text3); }

      .rp-card__header {
        display: flex; align-items: center;
        padding: 9px 12px 4px; gap: 6px;
      }

      .rp-card__title {
        font-size: 10px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.07em;
        color: var(--text2); flex: 1;
      }

      .rp-card__meta { font-size: 11px; color: var(--text3); }

      /* Status border variants */
      .rp-card--complete  { border-color: var(--success); background: #f0fdf4; }
      .rp-card--failed    { border-color: var(--danger);  background: #fff5f5; }
      .rp-card--paused    { border-color: var(--warn);    background: #fffcf0; }
      .rp-card--checkpoint { border-color: var(--warn);   background: #fffcf0; }

      /* ── Status badge ── */
      .rp-badge {
        font-size: 9px; font-weight: 700; text-transform: uppercase;
        padding: 1px 7px; border-radius: 100px; letter-spacing: 0.04em;
      }

      .rp-badge--idle      { background: var(--border2); color: var(--text3); }
      .rp-badge--planning  { background: var(--accent-soft); color: var(--accent); }
      .rp-badge--executing { background: #dbeafe; color: #1d4ed8; }
      .rp-badge--paused    { background: #fef9c3; color: #854d0e; }
      .rp-badge--complete  { background: #dcfce7; color: #15803d; }
      .rp-badge--failed    { background: #fee2e2; color: var(--danger); }

      /* ── Goal card ── */
      .rp-goal__desc {
        font-size: 12.5px; color: var(--text);
        line-height: 1.55; padding: 0 12px 10px;
      }

      .rp-goal__url {
        display: flex; align-items: center; gap: 5px;
        padding: 5px 12px; border-top: 1px solid var(--border2);
        font-size: 11px; color: var(--text2);
      }

      .rp-goal__url-text {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }

      /* ── Progress bar ── */
      .rp-progress {
        height: 3px; background: var(--border);
        margin: 2px 12px 8px; border-radius: 2px; overflow: hidden;
      }

      .rp-progress__fill {
        height: 100%; border-radius: 2px;
        background: var(--accent); transition: width 0.4s ease;
      }

      /* ── Steps ── */
      .rp-steps {
        padding: 0 8px 10px;
        display: flex; flex-direction: column; gap: 3px;
      }

      .rp-step {
        display: flex; align-items: flex-start; gap: 7px;
        padding: 5px 7px; border-radius: 6px;
        border: 1px solid transparent;
        transition: background 0.2s, border-color 0.2s;
      }

      .rp-step--pending   { color: var(--text3); }
      .rp-step--running   { background: var(--accent-soft); border-color: rgba(124,58,237,0.3); }
      .rp-step--completed { color: var(--success); }
      .rp-step--failed    { background: #fff5f5; border-color: rgba(220,38,38,0.3); }
      .rp-step--skipped   { opacity: 0.4; }

      .rp-step__icon {
        font-size: 10px; width: 13px; flex-shrink: 0;
        margin-top: 2px; text-align: center;
      }

      .rp-step--running .rp-step__icon { color: var(--accent); animation: rp-pulse 1.4s ease-in-out infinite; }
      .rp-step--completed .rp-step__icon { color: var(--success); }
      .rp-step--failed    .rp-step__icon { color: var(--danger); }

      @keyframes rp-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

      .rp-step__body {
        flex: 1; min-width: 0;
        display: flex; flex-direction: column; gap: 1px;
      }

      .rp-step__title {
        font-size: 11.5px; font-weight: 500; line-height: 1.4;
        color: var(--text); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }

      .rp-step--completed .rp-step__title { color: var(--text2); }
      .rp-step--failed    .rp-step__title { color: var(--danger); }
      .rp-step--running   .rp-step__title { color: var(--accent); }
      .rp-step--pending   .rp-step__title { color: var(--text3); }

      .rp-step__tool { font-size: 9.5px; font-family: var(--mono); color: var(--text3); }
      .rp-step__note { font-size: 9.5px; color: var(--text3); font-style: italic; }

      /* ── Action timeline ── */
      #rp-slot-timeline { flex-shrink: 1; min-height: 0; }

      .rp-card--timeline {
        display: flex; flex-direction: column;
        min-height: 0; flex: 1;
      }

      .rp-timeline {
        overflow-y: auto; padding: 4px 10px 10px;
        display: flex; flex-direction: column; gap: 1px;
        max-height: 260px;
      }

      .rp-timeline::-webkit-scrollbar { width: 2px; }
      .rp-timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }

      .rp-tl-entry {
        display: flex; align-items: baseline; gap: 6px;
        padding: 2px 6px; border-radius: 4px;
        transition: background 0.15s;
      }

      .rp-tl-entry--latest { background: var(--accent-soft); }

      .rp-tl-icon {
        font-size: 9px; width: 13px; flex-shrink: 0;
        text-align: center; color: var(--text3);
      }

      .rp-tl-entry--step_started    .rp-tl-icon { color: var(--accent); }
      .rp-tl-entry--step_completed  .rp-tl-icon { color: var(--success); }
      .rp-tl-entry--mission_complete .rp-tl-icon { color: var(--success); }
      .rp-tl-entry--checkpoint_waiting .rp-tl-icon { color: var(--warn); }
      .rp-tl-entry--mission_failed   .rp-tl-icon { color: var(--danger); }

      .rp-tl-body {
        flex: 1; min-width: 0;
        display: flex; align-items: baseline; gap: 6px;
      }

      .rp-tl-content {
        font-size: 11px; color: var(--text); flex: 1;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }

      .rp-tl-time { font-size: 9.5px; color: var(--text3); flex-shrink: 0; white-space: nowrap; }

      /* ── Checkpoint card ── */
      .rp-checkpoints { padding: 4px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

      .rp-checkpoint__q {
        font-size: 12.5px; color: var(--text);
        line-height: 1.55; margin-bottom: 8px;
      }

      .rp-checkpoint__actions { display: flex; gap: 8px; }

      .rp-btn {
        flex: 1; padding: 6px 10px; border-radius: 7px;
        border: 1px solid; cursor: pointer;
        font-family: var(--font); font-size: 12px; font-weight: 500;
        transition: opacity 0.12s, background 0.12s;
      }

      .rp-btn--approve { background: var(--success); border-color: var(--success); color: #fff; }
      .rp-btn--approve:hover { opacity: 0.82; }

      .rp-btn--reject { background: transparent; border-color: var(--border); color: var(--text2); }
      .rp-btn--reject:hover { background: var(--hover); }

      /* ── Animations ── */
      .entering { animation: rp-slide-in 0.28s ease-out; }

      @keyframes rp-slide-in {
        from { opacity: 0; transform: translateY(-5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .pulse { animation: rp-flash 0.6s ease-out; }

      @keyframes rp-flash {
        0%   { background: rgba(124,58,237,0.14); }
        100% { background: transparent; }
      }
    </style>
