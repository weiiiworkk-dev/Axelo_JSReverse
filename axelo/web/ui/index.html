<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axelo — AI 驱动逆向系统</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:        #ffffff;
        --panel:     #fdfbff;
        --border:    #b8a8e0;
        --border2:   #e5daf5;
        --accent:    #7b61c8;
        --accent2:   #a07ada;
        --text:      #1a0a35;
        --text2:     #6a5488;
        --success:   #3d8c52;
        --warn:      #9a6b20;
        --danger:    #9b2525;
        --mono:      'Courier New', Courier, monospace;
        --header-bg: #f0ebff;
        --header-text: #2d1a5e;
      }

      html, body { height: 100%; overflow: hidden; background: var(--bg); }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: var(--mono);
        color: var(--text);
      }

      /* ─── Header ──────────────────────────────────────────── */
      #header {
        background: var(--header-bg);
        color: var(--header-text);
        padding: 5px 14px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        font-size: 11px;
        font-family: var(--mono);
        border-bottom: 2px solid var(--border);
      }

      .hdr-logo {
        color: var(--accent);
        font-weight: bold;
        font-size: 12px;
        letter-spacing: 3px;
        white-space: nowrap;
      }

      .hdr-tagline { color: var(--text2); font-size: 11px; white-space: nowrap; }

      .hdr-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

      .hdr-session {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
      }

      .hdr-session select {
        font-family: var(--mono);
        font-size: 11px;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 2px 6px;
        color: var(--text);
        cursor: pointer;
        max-width: 200px;
      }

      .hdr-session label { color: var(--text2); white-space: nowrap; }

      .conn-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        color: var(--text2);
        border: 1px solid var(--border);
        padding: 2px 8px;
        white-space: nowrap;
        flex-shrink: 0;
        background: var(--bg);
      }

      .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 0.3s; }
      .conn-dot.live { background: var(--success); box-shadow: 0 0 4px var(--success); }

      /* ─── Main 2-panel layout ──────────────────────────────── */
      #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

      /* ─── Left Panel ────────────────────────────────────────── */
      #left-panel {
        width: 300px;
        min-width: 260px;
        background: var(--panel);
        border-right: 2px solid var(--border);
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        font-family: var(--mono);
      }

      /* ─── Right Panel ───────────────────────────────────────── */
      #right-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        font-family: var(--mono);
        border-left: 0;
      }

      #left-panel::-webkit-scrollbar { width: 4px; }
      #left-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 0; }
      * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

      /* ─── Bottom Bar ────────────────────────────────────────── */
      #bottom {
        flex-shrink: 0;
        background: var(--bg);
        border-top: 2px solid var(--border);
        font-family: var(--mono);
      }

      #readiness-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 14px;
        border-bottom: 1px solid var(--border2);
        font-size: 11px;
        background: var(--panel);
      }

      #readiness-label {
        white-space: nowrap;
        min-width: 90px;
        color: var(--text2);
      }

      #readiness-bar-bg {
        flex: 1;
        height: 12px;
        background: var(--border2);
        border: 1px solid var(--border);
        overflow: hidden;
        position: relative;
      }

      #readiness-bar-fill {
        height: 100%;
        width: 0%;
        transition: width 0.5s, background 0.5s;
        background: var(--danger);
      }

      #readiness-status {
        white-space: nowrap;
        min-width: 110px;
        font-size: 10px;
        color: var(--warn);
      }

      #main-start-btn {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 2px 10px;
        cursor: pointer;
        letter-spacing: 0.5px;
        white-space: nowrap;
        flex-shrink: 0;
        display: none;
      }

      #main-start-btn:disabled {
        color: var(--border);
        border-color: var(--border);
        cursor: not-allowed;
      }

      #main-start-btn:not(:disabled):hover {
        background: var(--accent);
        color: white;
      }

      #input-row {
        display: flex;
        align-items: center;
        padding: 5px 14px;
        gap: 8px;
        background: var(--bg);
      }

      .input-prompt {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: bold;
        color: var(--accent);
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
      }

      #main-input {
        flex: 1;
        font-family: var(--mono);
        font-size: 12px;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        resize: none;
        padding: 0;
        line-height: 1.5;
      }

      #main-send-btn {
        font-family: var(--mono);
        font-size: 10px;
        background: transparent;
        color: var(--text2);
        border: 1px solid var(--border);
        padding: 3px 10px;
        cursor: pointer;
        flex-shrink: 0;
      }

      #main-send-btn:hover { background: var(--border2); }
      #main-send-btn:disabled { color: var(--border); cursor: not-allowed; }

      /* ─── ChatPanel ─────────────────────────────────────────── */
      .cp-root { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

      .cp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--header-bg);
      }

      .cp-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--header-text);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .cp-phase-badge {
        font-size: 9px;
        font-weight: 700;
        padding: 2px 8px;
        color: white;
        background: var(--accent);
        transition: background 0.3s;
      }

      .cp-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .cp-messages::-webkit-scrollbar { width: 3px; }
      .cp-messages::-webkit-scrollbar-thumb { background: var(--border2); }

      .cp-welcome-msg {
        padding: 12px;
        border: 1px solid var(--border2);
        background: var(--panel);
        font-size: 11px;
        color: var(--text2);
        line-height: 1.8;
        border-left: 3px solid var(--accent);
      }

      .cp-welcome-icon { font-size: 18px; margin-bottom: 6px; display: block; }
      .cp-welcome-text { font-size: 11px; color: var(--text2); line-height: 1.8; }

      .cp-msg { display: flex; font-size: 11px; }
      .cp-msg-user { justify-content: flex-end; }
      .cp-msg-assistant { justify-content: flex-start; }

      .cp-msg-bubble {
        max-width: 90%;
        line-height: 1.6;
        padding: 6px 10px;
      }

      .cp-msg-user-bubble {
        background: #ede8ff;
        color: var(--text);
        border-left: 3px solid var(--accent);
      }

      .cp-msg-ai-bubble {
        background: var(--panel);
        border: 1px solid var(--border2);
        border-left: 3px solid var(--accent2);
        color: var(--text);
      }

      .cp-ai-spinner {
        display: flex;
        align-items: center;
        padding: 4px 14px;
        gap: 3px;
        flex-shrink: 0;
        font-size: 10px;
        color: var(--text2);
      }

      .cp-spinner-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        animation: cp-bounce 1.2s infinite;
      }

      .cp-spinner-dot:nth-child(2) { animation-delay: 0.2s; }
      .cp-spinner-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes cp-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

      .cp-error {
        padding: 5px 14px;
        font-size: 10px;
        color: var(--danger);
        border-top: 1px solid #f5cccc;
        flex-shrink: 0;
        background: #fff8f8;
      }

      /* Gap/missing items */
      .cp-gap-header { font-size: 10px; font-weight: 700; color: var(--danger); display: block; margin-bottom: 2px; }
      .cp-blocking-item { font-size: 10px; color: var(--danger); display: block; padding-left: 4px; }
      .cp-missing-item { font-size: 10px; color: var(--warn); display: block; padding-left: 4px; }

      /* ─── MissionContractPanel ──────────────────────────────── */
      .mcp-root { display: flex; flex-direction: column; height: 100%; font-family: var(--mono); }

      .mcp-locked { opacity: 0.85; }

      .mcp-header {
        background: var(--header-bg);
        padding: 6px 12px;
        color: var(--header-text);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 10px;
        border-bottom: 1px solid var(--border);
      }

      .mcp-logo {
        color: var(--accent);
        font-weight: bold;
        font-size: 11px;
        letter-spacing: 3px;
      }

      .mcp-subtitle { color: var(--text2); font-size: 9px; margin-top: 1px; }

      .mcp-version-badge {
        font-size: 9px;
        color: var(--text2);
        border: 1px solid var(--border);
        padding: 1px 5px;
        background: var(--bg);
      }

      .mcp-conf-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 12px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
        background: var(--panel);
      }

      .mcp-conf-bar-bg {
        flex: 1;
        height: 8px;
        background: var(--border2);
        border: 1px solid var(--border);
        overflow: hidden;
      }

      .mcp-conf-bar-fill { height: 100%; transition: width 0.5s, background 0.5s; }
      .mcp-conf-label { font-size: 9px; font-weight: 700; white-space: nowrap; }

      .mcp-section { padding: 8px 12px; border-bottom: 1px solid var(--border2); }

      .mcp-section.mcp-delta { animation: mcp-flash 1.5s ease-out; }

      @keyframes mcp-flash { 0%,100%{background:transparent} 30%{background:rgba(123,97,200,0.08)} }

      .mcp-section-warn { background: #fffcf0; }

      .mcp-section-title {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text2);
        margin-bottom: 5px;
      }

      .mcp-val { font-size: 10px; color: var(--text); line-height: 1.5; }
      .mcp-url { font-family: var(--mono); font-size: 10px; word-break: break-all; color: var(--accent); }
      .mcp-meta { font-size: 9px; color: var(--text2); margin-top: 2px; }
      .mcp-objective { font-size: 10px; color: var(--text); line-height: 1.6; }

      .mcp-badge {
        display: inline-block;
        font-size: 8px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 1px 5px;
        margin-top: 3px;
        border: 1px solid;
      }

      .mcp-badge-extract_data { border-color: var(--accent); color: var(--accent); }
      .mcp-badge-reverse_engineer { border-color: var(--accent2); color: var(--accent2); }
      .mcp-badge-crawl { border-color: var(--success); color: var(--success); }
      .mcp-badge-monitor { border-color: #9b59b6; color: #9b59b6; }

      .mcp-fields-list { display: flex; flex-direction: column; gap: 3px; }

      .mcp-field-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
      .mcp-field-name { font-weight: 700; color: var(--text); flex: 1; }
      .mcp-field-type { font-size: 9px; font-family: var(--mono); }
      .mcp-field-req { font-size: 8px; border: 1px solid var(--accent2); color: var(--accent2); padding: 0 3px; font-weight: 700; }
      .mcp-field-opt { font-size: 8px; color: var(--text2); padding: 0 3px; border: 1px solid var(--border2); }

      .mcp-chips { display: flex; flex-wrap: wrap; gap: 4px; }
      .mcp-chip { font-size: 9px; background: var(--border2); border: 1px solid var(--border); padding: 1px 5px; color: var(--text2); }

      .mcp-assumption { font-size: 9px; color: var(--text2); line-height: 1.5; }
      .mcp-gap { font-size: 9px; color: var(--warn); line-height: 1.5; }

      .mcp-placeholder {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        gap: 14px;
      }

      .mcp-ph-icon { font-size: 28px; }
      .mcp-ph-text { font-size: 10px; color: var(--text2); text-align: center; line-height: 1.9; }
      .mcp-empty-section { opacity: 0.5; }
      .mcp-empty-hint { font-size: 10px; color: var(--text2); font-style: italic; }

      .mcp-locked-banner {
        text-align: center;
        padding: 6px 12px;
        font-size: 10px;
        color: var(--accent);
        border-top: 1px solid var(--border2);
        flex-shrink: 0;
        background: #f5f0ff;
        letter-spacing: 1px;
      }

      .mcp-ready-line {
        padding: 7px 12px;
        font-size: 10px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 1.5px;
        border-top: 1px solid var(--border2);
        background: #f8f5ff;
      }

      /* ─── ExecutionTimelinePanel ────────────────────────────── */
      .etp-root {
        display: flex;
        flex-direction: column;
        height: 100%;
        color: var(--text);
        font-family: var(--mono);
        background: var(--bg);
      }

      .etp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--header-bg);
        color: var(--header-text);
      }

      .etp-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text2); }
      .etp-step-badge { font-size: 9px; border: 1px solid var(--border); color: var(--text2); padding: 1px 7px; background: var(--bg); }

      .etp-coverage-strip {
        display: grid;
        grid-template-columns: repeat(4,1fr);
        gap: 4px 8px;
        padding: 6px 12px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
        background: var(--panel);
      }

      .etp-cov-item { display: flex; flex-direction: column; gap: 2px; }
      .etp-cov-name { font-size: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
      .etp-cov-bar-bg { height: 4px; background: var(--border2); border: 1px solid var(--border); overflow: hidden; }
      .etp-cov-bar-fill { height: 100%; transition: width 0.5s, background 0.5s; }
      .etp-cov-pct { font-size: 8px; color: var(--text2); }

      .etp-trust-row {
        display: flex;
        gap: 10px;
        padding: 5px 12px;
        border-bottom: 1px solid var(--border2);
        flex-shrink: 0;
        background: var(--panel);
      }

      .etp-trust-item { flex: 1; display: flex; align-items: center; gap: 5px; }
      .etp-trust-lbl { font-size: 8px; color: var(--text2); width: 30px; flex-shrink: 0; }
      .etp-trust-bar-bg { flex: 1; height: 5px; background: var(--border2); border: 1px solid var(--border); overflow: hidden; }
      .etp-trust-fill { height: 100%; transition: width 0.5s, background 0.5s; }
      .etp-trust-pct { font-size: 8px; color: var(--text2); width: 24px; text-align: right; }

      .etp-timeline {
        flex: 1;
        overflow-y: auto;
        padding: 6px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .etp-timeline::-webkit-scrollbar { width: 3px; }
      .etp-timeline::-webkit-scrollbar-thumb { background: var(--border2); }
      .etp-empty-hint { font-size: 10px; color: var(--text2); text-align: center; padding: 20px; }

      .etp-entry {
        display: flex;
        gap: 8px;
        padding: 5px 8px;
        border: 1px solid var(--border2);
        background: var(--panel);
      }

      .etp-entry-active { border-color: var(--accent); background: #f5f0ff; }
      .etp-entry-done { border-color: var(--success); background: #f0fff8; }
      .etp-entry-failed { border-color: var(--danger); background: #fff0f0; }

      .etp-entry-status { font-size: 11px; flex-shrink: 0; width: 14px; text-align: center; color: var(--text2); }
      .etp-entry-active .etp-entry-status { color: var(--accent); animation: etp-spin 1.5s linear infinite; }

      @keyframes etp-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

      .etp-entry-done .etp-entry-status { color: var(--success); }
      .etp-entry-failed .etp-entry-status { color: var(--danger); }

      .etp-entry-body { flex: 1; min-width: 0; }
      .etp-entry-header { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
      .etp-entry-icon { font-size: 11px; flex-shrink: 0; }
      .etp-entry-obj { font-size: 10px; font-weight: 700; color: var(--text); flex: 1; }
      .etp-entry-role { font-size: 8px; color: var(--text2); white-space: nowrap; }
      .etp-entry-summary { font-size: 9px; color: var(--text2); line-height: 1.5; }
      .etp-entry-risk { font-size: 9px; color: var(--warn); margin-top: 2px; }

      .etp-verdict-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        border: 2px solid;
        background: var(--panel);
        margin-top: 4px;
      }

      .etp-verdict-icon { font-size: 16px; flex-shrink: 0; }
      .etp-verdict-tier { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; }
      .etp-verdict-msg { font-size: 9px; color: var(--text2); margin-top: 2px; line-height: 1.5; }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="header">
        <div class="hdr-logo">AXELO</div>
        <div class="hdr-tagline">AI 需求助手 — 描述你的目标，准备好后点击「开始任务」</div>
        <div class="hdr-sep"></div>
        <div class="hdr-session">
          <label>Session:</label>
          <select id="session-select"><option value="">-- 选择 --</option></select>
        </div>
        <div class="conn-badge">
          <div class="conn-dot" id="conn-dot"></div>
          <span id="conn-label">离线</span>
        </div>
      </div>

      <div id="main">
        <div id="left-panel"></div>
        <div id="right-panel"></div>
      </div>

      <div id="bottom">
        <div id="readiness-row">
          <span id="readiness-label">就绪度：0%</span>
          <div id="readiness-bar-bg">
            <div id="readiness-bar-fill"></div>
          </div>
          <span id="readiness-status">需要更多信息</span>
          <button id="main-start-btn" disabled>[ 开始任务 ]</button>
        </div>
        <div id="input-row">
          <span class="input-prompt">输入 &gt;</span>
          <textarea id="main-input" rows="1" placeholder="告诉 Axelo 你想爬取什么，或者想逆向分析哪个网站..."></textarea>
          <button id="main-send-btn">发送</button>
        </div>
      </div>
    </div>
  </body>
</html>
